<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>BuildSphere</title>
  </head>
  <body>
    <!-- Capture hash before any JS module loads -->
    <script>
      if (window.location.hash && (window.location.hash.includes('type=recovery') || window.location.hash.includes('type=invite'))) {
        sessionStorage.setItem('supabase_recovery_hash', window.location.hash);
      }
    </script>
    <!-- The exact target element from the existing React app.jsx -->
    <div id="app"></div>
    <!-- Point to the migrated entry source -->
    <script type="module" src="/src/app.jsx"></script>
  </body>
</html>
